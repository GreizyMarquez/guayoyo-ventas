<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Guayoyo · Ventas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --azul:#1B2ED4;
  --rojo:#E8341A;
  --fondo:#E8E4DC;
  --blanco:#FFFFFF;
  --texto:#111111;
  --muted:#666660;
  --border:#ccc8be;
  --shadow:0 2px 12px rgba(27,46,212,0.10);
}
body{font-family:'Inter',sans-serif;background:var(--fondo);color:var(--texto);min-height:100vh;padding-bottom:80px;}
.app-header{background:var(--azul);padding:16px 20px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.logo-img{height:52px;width:52px;object-fit:contain;display:block;border-radius:12px;}
.app-header .fecha{font-size:11px;color:rgba(255,255,255,0.6);font-weight:500;display:block;text-align:right;}
.sync-badge{font-size:10px;color:rgba(255,255,255,0.55);text-align:right;margin-top:2px;}
.tabs{display:flex;background:var(--azul);padding:0 12px 12px;gap:8px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:0 0 auto;padding:9px 14px;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.7);transition:all 0.2s;-webkit-tap-highlight-color:transparent;letter-spacing:0.3px;white-space:nowrap;}
.tab.active{background:var(--rojo);color:var(--blanco);}
.page{display:none;padding:16px;}
.page.active{display:block;}

/* BCV */
.tasas-bar{background:var(--blanco);border:2px solid var(--azul);border-radius:14px;padding:14px 16px;margin-bottom:16px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px;}
.tasa-row{display:flex;align-items:center;gap:10px;}
.tasa-row label{font-size:12px;font-weight:700;color:var(--azul);white-space:nowrap;width:96px;}
.tasa-row input{flex:1;border:2px solid var(--border);border-radius:8px;padding:8px 10px;font-family:'Inter',sans-serif;font-size:16px;font-weight:700;color:var(--texto);background:var(--fondo);outline:none;-webkit-appearance:none;}
.tasa-row input:focus{border-color:var(--azul);}

/* CATEGORÍAS */
.cat-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;scrollbar-width:none;}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-btn{white-space:nowrap;padding:7px 14px;border-radius:20px;border:2px solid var(--border);background:var(--blanco);font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.15s;}
.cat-btn.active{background:var(--azul);color:var(--blanco);border-color:var(--azul);}

/* PRODUCTOS */
.products-list{display:flex;flex-direction:column;gap:8px;}
.product-card{background:var(--blanco);border:2px solid var(--border);border-radius:14px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:var(--shadow);}
.product-card.has-qty{border-color:var(--azul);}
.product-info{flex:1;}
.product-name{font-size:13px;font-weight:600;color:var(--texto);line-height:1.3;}
.product-cat{font-size:10px;color:var(--muted);margin-top:2px;font-weight:500;}
.product-price{font-size:14px;font-weight:800;color:var(--rojo);white-space:nowrap;}
.qty-control{display:flex;align-items:center;gap:6px;}
.qty-btn{width:30px;height:30px;border-radius:50%;border:none;font-size:18px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.qty-btn.minus{background:var(--fondo);color:var(--azul);border:2px solid var(--border);}
.qty-btn.plus{background:var(--azul);color:var(--blanco);}
.qty-btn:active{transform:scale(0.88);}
.qty-num{font-size:15px;font-weight:800;min-width:20px;text-align:center;color:var(--azul);}

/* CARRITO */
.order-summary{background:var(--blanco);border:2px solid var(--azul);border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:var(--shadow);}
.order-summary h3{font-size:11px;font-weight:800;color:var(--azul);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;}
.order-item{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--fondo);}
.order-item:last-child{border:none;}
.order-total{display:flex;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:2px solid var(--azul);}
.order-total span:first-child{font-size:14px;font-weight:800;color:var(--azul);}
.order-total-usd{font-size:20px;font-weight:800;color:var(--rojo);}
.order-total-bs{font-size:11px;color:var(--muted);text-align:right;margin-top:2px;}

/* PAGO */
.pay-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--azul);margin-bottom:8px;}
.pay-methods{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.pay-btn{padding:12px 8px;border:2px solid var(--border);border-radius:12px;background:var(--blanco);font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent;transition:all 0.15s;}
.pay-btn.selected{border-color:var(--rojo);background:var(--rojo);color:var(--blanco);}

/* TOGGLE LINK (genérico) */
.toggle-link{background:none;border:none;color:var(--azul);font-size:12px;font-weight:700;cursor:pointer;padding:0;margin-bottom:10px;text-decoration:underline;-webkit-tap-highlight-color:transparent;display:block;}

/* SPLIT PAY */
.split-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.split-row label{flex:1;font-size:12px;font-weight:600;color:var(--texto);}
.split-row input{width:110px;border:2px solid var(--border);border-radius:8px;padding:8px 10px;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;text-align:right;outline:none;-webkit-appearance:none;}
.split-row input:focus{border-color:var(--azul);}
.split-status{font-size:12px;font-weight:800;padding:10px;border-radius:10px;text-align:center;margin-top:6px;}
.split-status.ok{background:#dcfce7;color:#166534;}
.split-status.warn{background:#fef3e2;color:#b07d00;}

/* GUARDAR */
.btn-save{width:100%;background:var(--azul);color:var(--blanco);border:none;border-radius:14px;padding:16px;font-family:'Syne',sans-serif;font-size:16px;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity 0.2s;letter-spacing:1px;}
.btn-save:active{opacity:0.82;}
.btn-save:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;}
.btn-secundario{width:100%;background:var(--rojo);color:var(--blanco);border:none;border-radius:12px;padding:13px;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:0.5px;-webkit-tap-highlight-color:transparent;}
.btn-secundario:active{opacity:0.85;}

/* FORM GENÉRICO */
.form-card{background:var(--blanco);border:2px solid var(--border);border-radius:14px;padding:14px;margin-bottom:16px;box-shadow:var(--shadow);}
.form-card h3{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--azul);margin-bottom:10px;}
.form-row{margin-bottom:10px;}
.form-row label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;}
.form-row input,.form-row select{width:100%;border:2px solid var(--border);border-radius:10px;padding:9px 12px;font-family:'Inter',sans-serif;font-size:14px;color:var(--texto);background:var(--fondo);outline:none;-webkit-appearance:none;}
.form-row input:focus,.form-row select:focus{border-color:var(--azul);}
.moneda-toggle{display:flex;gap:6px;margin-bottom:8px;}
.moneda-btn{flex:1;padding:7px;border:2px solid var(--border);border-radius:8px;background:var(--blanco);font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.moneda-btn.selected{background:var(--azul);color:var(--blanco);border-color:var(--azul);}

/* HISTORIAL */
.order-history-item{background:var(--blanco);border:2px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;}
.order-history-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.order-num{font-size:12px;font-weight:800;color:var(--azul);background:var(--fondo);padding:3px 10px;border-radius:20px;border:1.5px solid var(--border);}
.order-pay-tag{font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;}
.pay-pm{background:#dbeafe;color:#1B2ED4;}
.pay-pos{background:#fef3e2;color:#b07d00;}
.pay-ebs{background:#dcfce7;color:#166534;}
.pay-ediv{background:#f3e8ff;color:#6b21a8;}
.pay-mixto{background:#e0e7ff;color:#3730a3;}
.order-history-products{font-size:12px;color:var(--muted);margin-bottom:6px;line-height:1.5;}
.order-history-total{font-size:14px;font-weight:800;color:var(--rojo);}

/* LISTAS gastos/facturas */
.list-item{background:var(--blanco);border:2px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.list-item-info{flex:1;}
.list-item-title{font-size:13px;font-weight:700;color:var(--texto);}
.list-item-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.list-item-amount{font-size:14px;font-weight:800;color:var(--rojo);white-space:nowrap;text-align:right;}
.list-item-del{background:none;border:none;color:#c0392b;font-size:10px;font-weight:700;cursor:pointer;padding:0;margin-top:6px;margin-right:10px;-webkit-tap-highlight-color:transparent;}
.estado-tag{font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px;margin-left:6px;}
.estado-pendiente{background:#fef3e2;color:#b07d00;}
.estado-pagada{background:#dcfce7;color:#166534;}

/* EMPLEADOS */
.emp-card{background:var(--blanco);border:2px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow);}
.emp-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.emp-nombre{font-size:15px;font-weight:800;color:var(--azul);}
.emp-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.emp-detail{display:none;margin-top:14px;padding-top:14px;border-top:2px solid var(--fondo);}
.emp-detail.show{display:block;}
.emp-summary-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;}
.emp-summary-row.total{border-top:2px solid var(--azul);margin-top:6px;padding-top:8px;font-weight:800;color:var(--azul);}
.emp-actions{display:flex;gap:8px;margin-top:10px;}
.emp-actions button{flex:1;padding:9px;border-radius:10px;border:2px solid var(--azul);background:var(--blanco);color:var(--azul);font-size:11px;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent;}

/* RESUMEN */
.summary-date{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--azul);margin-bottom:16px;text-transform:capitalize;}
.summary-card{background:var(--blanco);border:2px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.summary-card h3{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--azul);margin-bottom:12px;}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--fondo);font-size:13px;}
.summary-row:last-child{border:none;}
.summary-row .val{font-weight:800;color:var(--rojo);}
.summary-total-row{display:flex;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:2px solid var(--azul);font-size:16px;font-weight:800;}
.balance-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--fondo);font-size:13px;}
.balance-row:last-child{border:none;}
.balance-pos{color:#166534;font-weight:800;}
.balance-neg{color:#c0392b;font-weight:800;}

/* DATE */
.date-select{display:flex;gap:8px;margin-bottom:14px;align-items:center;}
.date-select input[type=date]{flex:1;border:2px solid var(--border);border-radius:10px;padding:9px 12px;font-family:'Inter',sans-serif;font-size:13px;background:var(--blanco);color:var(--texto);outline:none;-webkit-appearance:none;}
.date-select input:focus{border-color:var(--azul);}
.btn-today{background:var(--azul);color:var(--blanco);border:none;border-radius:10px;padding:9px 14px;font-family:'Inter',sans-serif;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;}

/* TURNO */
.turno-toggle{display:flex;gap:8px;margin-bottom:14px;}
.turno-btn{flex:1;padding:10px;border:2px solid var(--border);border-radius:12px;background:var(--blanco);font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.turno-btn.selected{background:var(--azul);color:var(--blanco);border-color:var(--azul);}

/* PENDIENTE DE PAGO */
.pendiente-box{margin-top:14px;background:var(--blanco);border:2px dashed var(--border);border-radius:14px;padding:12px 14px;}
.pendiente-box label{display:block;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:8px;}
.pendiente-box input{width:100%;border:2px solid var(--border);border-radius:10px;padding:9px 12px;font-family:'Inter',sans-serif;font-size:14px;background:var(--fondo);outline:none;margin-bottom:8px;-webkit-appearance:none;}
.pendiente-box input:focus{border-color:var(--azul);}
.btn-pendiente{width:100%;background:var(--blanco);color:var(--azul);border:2px solid var(--azul);border-radius:12px;padding:11px;font-family:'Inter',sans-serif;font-size:13px;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.btn-pendiente:disabled{border-color:var(--border);color:var(--muted);cursor:not-allowed;}

/* CUENTAS ABIERTAS */
.abierta-card{background:var(--blanco);border:2px solid var(--gold,var(--border));border-left:5px solid #b07d00;border-radius:12px;padding:12px 14px;margin-bottom:10px;}
.abierta-ref{font-size:14px;font-weight:800;color:var(--azul);}
.abierta-meta{font-size:11px;color:var(--muted);margin:2px 0 6px;}
.btn-cobrar{background:var(--rojo);color:var(--blanco);border:none;border-radius:10px;padding:9px 14px;font-size:12px;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.btn-cancelar-abierta{background:none;border:none;color:#c0392b;font-size:11px;font-weight:700;cursor:pointer;margin-left:10px;-webkit-tap-highlight-color:transparent;}
.cobro-panel{margin-top:12px;padding-top:12px;border-top:2px solid var(--fondo);}

/* CIERRE DE TURNO */
.cierre-card{background:var(--blanco);border:2px solid var(--azul);border-radius:14px;padding:16px;margin-bottom:16px;box-shadow:var(--shadow);}
.cierre-card h3{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--azul);margin-bottom:10px;}
.cierre-pasado{background:var(--fondo);border-radius:10px;padding:8px 10px;font-size:11px;color:var(--muted);margin-bottom:6px;}

/* APERTURA DE CAJA */
.apertura-row{display:flex;gap:8px;margin-bottom:8px;}
.apertura-row input{flex:1;border:2px solid var(--border);border-radius:10px;padding:9px 12px;font-family:'Inter',sans-serif;font-size:14px;background:var(--fondo);outline:none;-webkit-appearance:none;}
.apertura-row input:focus{border-color:var(--azul);}

/* ZONA DE PELIGRO */
.danger-zone{margin-top:26px;padding-top:16px;border-top:2px dashed var(--border);text-align:center;}
.btn-danger{background:var(--blanco);color:#c0392b;border:2px solid #c0392b;border-radius:12px;padding:11px 16px;font-family:'Inter',sans-serif;font-size:12px;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.danger-hint{font-size:10px;color:var(--muted);margin-top:8px;line-height:1.5;}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;}
.empty-icon{font-size:40px;margin-bottom:10px;}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--azul);color:white;padding:10px 24px;border-radius:20px;font-weight:800;font-size:13px;transition:transform 0.3s;z-index:200;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>

<!-- NUEVO PEDIDO -->
<div class="page active" id="page-nuevo">
  <div class="turno-toggle">
    <button class="turno-btn" id="turno-manana" onclick="setTurno('manana')">🌅 Turno Mañana</button>
    <button class="turno-btn" id="turno-tarde" onclick="setTurno('tarde')">🌇 Turno Tarde</button>
  </div>
  <div class="tasas-bar">
    <div class="tasa-row">
      <label>💵 BCV USD</label>
      <input type="number" id="tasaUSD" placeholder="0.00" inputmode="decimal" oninput="onTasaChange()">
    </div>
    <div class="tasa-row">
      <label>💶 BCV EUR</label>
      <input type="number" id="tasaEUR" placeholder="0.00" inputmode="decimal" oninput="onTasaChange()">
    </div>
    <button class="toggle-link" onclick="toggleHistorialTasas()" id="btnHistorialTasas" style="margin:0;">▸ ver tasas guardadas</button>
    <div id="historialTasasBox" style="display:none;flex-direction:column;gap:2px;"></div>
  </div>
  <div class="order-summary" id="cartSummary" style="display:none;">
    <h3>🛒 Pedido actual</h3>
    <div id="cartItems"></div>
    <div class="order-total">
      <span>Total</span>
      <div>
        <div class="order-total-usd" id="cartTotalUSD">$0.00</div>
        <div class="order-total-bs" id="cartTotalBs"></div>
      </div>
    </div>
  </div>
  <div class="cat-scroll" id="catScroll"></div>
  <div class="products-list" id="productsList"></div>
  <div style="margin-top:16px;">
    <div class="pay-label">Método de pago</div>
    <div class="pay-methods" id="payMethodsSimple">
      <button class="pay-btn" onclick="selectPay('PM')" id="pay-PM">📲 Pago Móvil</button>
      <button class="pay-btn" onclick="selectPay('POS')" id="pay-POS">💳 POS</button>
      <button class="pay-btn" onclick="selectPay('EBS')" id="pay-EBS">💵 Efectivo Bs</button>
      <button class="pay-btn" onclick="selectPay('EDIV')" id="pay-EDIV">💴 Efectivo Divisas</button>
    </div>
    <button class="toggle-link" onclick="toggleSplitPay()" id="btnSplitToggle">➕ Dividir el pago entre varios métodos</button>
    <div id="payMethodsSplit" style="display:none;margin-bottom:14px;">
      <div class="split-row"><label>💴 Efectivo Divisas ($)</label><input type="number" inputmode="decimal" id="split-EDIV" placeholder="0.00" oninput="updateTotals()"></div>
      <div class="split-row"><label>📲 Pago Móvil (Bs)</label><input type="number" inputmode="decimal" id="split-PM" placeholder="0" oninput="updateTotals()"></div>
      <div class="split-row"><label>💳 POS (Bs)</label><input type="number" inputmode="decimal" id="split-POS" placeholder="0" oninput="updateTotals()"></div>
      <div class="split-row"><label>💵 Efectivo Bs</label><input type="number" inputmode="decimal" id="split-EBS" placeholder="0" oninput="updateTotals()"></div>
      <div class="split-status" id="splitStatus"></div>
    </div>
    <button class="btn-save" id="btnGuardar" onclick="guardarPedido()" disabled>GUARDAR PEDIDO</button>
    <div class="pendiente-box">
      <label>¿El cliente paga después? Ponle una referencia y déjalo pendiente:</label>
      <input type="text" id="pedidoReferencia" placeholder="Ej: Mesa 3, Juan...">
      <button class="btn-pendiente" id="btnPendiente" onclick="dejarPendiente()" disabled>🕓 Dejar pendiente de pago</button>
    </div>
  </div>
</div>

<!-- PEDIDOS -->
<div class="page" id="page-pedidos">
  <div class="date-select">
    <input type="date" id="pedidosDate" onchange="renderPedidos()">
    <button class="btn-today" onclick="setTodayPedidos()">Hoy</button>
  </div>
  <div id="pedidosList"></div>
</div>

<!-- CUENTAS ABIERTAS -->
<div class="page" id="page-abiertas">
  <input type="text" id="buscarAbierta" placeholder="🔍 Buscar por referencia..." oninput="renderAbiertas()" style="width:100%;border:2px solid var(--border);border-radius:10px;padding:10px 12px;font-family:'Inter',sans-serif;font-size:14px;background:var(--blanco);outline:none;margin-bottom:14px;-webkit-appearance:none;">
  <div id="abiertasList"></div>
</div>

function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function uid(){return Date.now()+'_'+Math.random().toString(36).slice(2,8);}
function fmt$(n){return '$'+(n||0).toFixed(2);}
function fmtBs(n){return 'Bs '+(n||0).toFixed(2);}

function cargarJSON(key){
  try{const r=localStorage.getItem(key);return r?JSON.parse(r):[];}catch(e){return [];}
}
function guardarJSON(key,data){
  try{localStorage.setItem(key,JSON.stringify(data));return true;}catch(e){console.warn('No se pudo guardar',key,e);return false;}
}

// Registra que un elemento fue borrado en este dispositivo (tipo+id+hora).
// Esto evita que la sincronización lo "resucite" si la nube todavía lo tiene
// (por ejemplo, porque el borrado en la nube falló, tardó, u otro dispositivo
// no se había enterado). Se conserva 180 días y luego se limpia solo.
function registrarBorrado(tipo,id){
  const corte=Date.now()-1000*60*60*24*180;
  let borrados=cargarJSON('guayoyo_borrados').filter(b=>b.ts>corte);
  borrados.push({tipo,id:String(id),ts:Date.now()});
  guardarJSON('guayoyo_borrados',borrados);
}

// ---------- Migración de pedidos antiguos (guardados por día) ----------
function migrarPedidosAntiguos(){
  if(localStorage.getItem('guayoyo_pedidos')) return;
  const todos=[];
  for(let i=0;i<localStorage.length;i++){
    const key=localStorage.key(i);
    if(key && /^guayoyo_\d{4}-\d{2}-\d{2}$/.test(key)){
      try{
        const fecha=key.replace('guayoyo_','');
        const ordenes=JSON.parse(localStorage.getItem(key))||[];
        ordenes.forEach(o=>{ if(!o.fecha)o.fecha=fecha; if(!o.id)o.id=uid(); todos.push(o); });
      }catch(e){}
    }
  }
  guardarJSON('guayoyo_pedidos',todos);
}

function seedEmpleados(){

function guardarTasasDeHoy(){
  const tasaUSD=parseFloat(document.getElementById('tasaUSD').value)||0;
  const tasaEUR=parseFloat(document.getElementById('tasaEUR').value)||0;
  if(!tasaUSD && !tasaEUR) return;
  const historial=cargarJSON('guayoyo_tasas_historial');
  const idx=historial.findIndex(r=>r.fecha===todayKey());
  const registro={fecha:todayKey(),tasaUSD,tasaEUR,_ts:Date.now()};
  if(idx>=0) historial[idx]=registro; else historial.push(registro);
  guardarJSON('guayoyo_tasas_historial',historial);
  renderHistorialTasas();
  sincronizarEnNube('tasa',registro);
}
let debounceTasa=null;
function onTasaChange(){
  updateTotals();
  if(debounceTasa) clearTimeout(debounceTasa);
  debounceTasa=setTimeout(guardarTasasDeHoy,900);
}
function obtenerTasaFecha(fecha){
  return cargarJSON('guayoyo_tasas_historial').find(r=>r.fecha===fecha) || null;
}
function prellenarTasas(){
  const historial=cargarJSON('guayoyo_tasas_historial').slice().sort((a,b)=>b.fecha.localeCompare(a.fecha));
  if(!historial.length) return;
  document.getElementById('tasaUSD').value=historial[0].tasaUSD||'';
  document.getElementById('tasaEUR').value=historial[0].tasaEUR||'';
}
function renderHistorialTasas(){
  const historial=cargarJSON('guayoyo_tasas_historial').slice().sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const box=document.getElementById('historialTasasBox');
  const btn=document.getElementById('btnHistorialTasas');
  const abierto=btn.textContent.trim().startsWith('▾');
  btn.textContent=(abierto?'▾':'▸')+` ver tasas guardadas (${historial.length})`;
  box.innerHTML=historial.length? historial.slice(0,30).map(r=>`

      ${r.fecha}${r.fecha===todayKey()?' · HOY':''} — USD ${r.tasaUSD||'—'} · EUR ${r.tasaEUR||'—'}
    </div>`).join('') : '<div style="font-size:11px;color:var(--muted);">Sin tasas guardadas.</div>';
}

function getOrders(dk){ return cargarJSON('guayoyo_pedidos').filter(o=>o.fecha===dk); }
function addOrderToStore(o){
  const todos=cargarJSON('guayoyo_pedidos');
  todos.push(o);
  guardarJSON('guayoyo_pedidos',todos);
}
function pagosDe(o){
  if(o.pagos && o.pagos.length) return o.pagos;
  return [{metodo:o.pay,montoUSD:o.totalUSD,montoBs:o.totalBs}];
}

function filterCat(cat){
  currentCat=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.textContent===cat));
  renderProducts();
}

function renderProducts(){
  const list=document.getElementById('productsList');list.innerHTML='';
  const filtered=currentCat==='Todos'?MENU:MENU.filter(p=>p.cat===currentCat);
  filtered.forEach(p=>{
    const idx=MENU.indexOf(p);const qty=cart[idx]||0;
    const card=document.createElement('div');
    card.className='product-card'+(qty>0?' has-qty':'');
    card.id='card-'+idx;
    card.innerHTML=`
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-cat">${p.cat}</div>
      </div>
      <div class="product-price">$${p.price.toFixed(2)}</div>
      <div class="qty-control">
        <button class="qty-btn minus" onclick="changeQty(${idx},-1)">−</button>
        <span class="qty-num" id="qty-${idx}">${qty}</span>
        <button class="qty-btn plus" onclick="changeQty(${idx},1)">+</button>
      </div>`;
    list.appendChild(card);
  });
}

function changeQty(idx,delta){
  const next=Math.max(0,(cart[idx]||0)+delta);
  if(next===0)delete cart[idx];else cart[idx]=next;
  const el=document.getElementById('qty-'+idx);if(el)el.textContent=next;
  const card=document.getElementById('card-'+idx);
  if(card)card.classList.toggle('has-qty',next>0);
  updateTotals();
}

function toggleSplitPay(){
  modoSplit=!modoSplit;
  document.getElementById('payMethodsSimple').style.display=modoSplit?'none':'grid';
  document.getElementById('payMethodsSplit').style.display=modoSplit?'block':'none';
  document.getElementById('btnSplitToggle').textContent=modoSplit?'← Volver a un solo método':'➕ Dividir el pago entre varios métodos';
  if(!modoSplit){ selectedPay=''; document.querySelectorAll('#payMethodsSimple .pay-btn').forEach(b=>b.classList.remove('selected')); }
  updateTotals();
}

function calcularAsignadoSplit(){
  const tasa=parseFloat(document.getElementById('tasaUSD').value)||0;
  let asignadoUSD=0; const pagos=[];
  ['EDIV','PM','POS','EBS'].forEach(m=>{
    const val=parseFloat(document.getElementById('split-'+m).value)||0;
    if(val>0){
      if(MONEDA_METODO[m]==='USD'){ pagos.push({metodo:m,montoUSD:val,montoBs:tasa>0?val*tasa:null}); asignadoUSD+=val; }
      else { const usdEq=tasa>0?val/tasa:0; pagos.push({metodo:m,montoUSD:usdEq,montoBs:val}); asignadoUSD+=usdEq; }
    }
  });
  return {pagos,asignadoUSD};
}

function updateTotals(){
  const tasa=parseFloat(document.getElementById('tasaUSD').value)||0;
  let totalUSD=0;const items=[];
  Object.entries(cart).forEach(([idx,qty])=>{
    const p=MENU[parseInt(idx)];totalUSD+=p.price*qty;
    items.push({name:p.name,qty,subtotal:p.price*qty});
  });
  const cs=document.getElementById('cartSummary');
  if(items.length===0){cs.style.display='none';}
  else{
    cs.style.display='block';
    document.getElementById('cartItems').innerHTML=items.map(i=>
      `<div class="order-item"><span>${i.qty}× ${i.name}</span><span style="font-weight:700;color:var(--rojo);">$${i.subtotal.toFixed(2)}</span></div>`
    ).join('');
    document.getElementById('cartTotalUSD').textContent=`$${totalUSD.toFixed(2)}`;
    document.getElementById('cartTotalBs').textContent=tasa>0?`Bs ${(totalUSD*tasa).toFixed(2)}`:'Ingresa tasa BCV';
  }

  let listo=false;
  if(modoSplit){
    const {asignadoUSD}=calcularAsignadoSplit();
    const status=document.getElementById('splitStatus');
    if(items.length===0){ status.textContent=''; status.className='split-status'; }
    else{
      const diff=totalUSD-asignadoUSD;
      if(Math.abs(diff)<0.01){ status.textContent=`✅ Cuadra: $${asignadoUSD.toFixed(2)}`; status.className='split-status ok'; listo=true; }
      else if(diff>0){ status.textContent=`⚠️ Falta asignar $${diff.toFixed(2)}`; status.className='split-status warn'; }
      else{ status.textContent=`⚠️ Sobran $${Math.abs(diff).toFixed(2)} asignados`; status.className='split-status warn'; }
    }
  } else {
    listo = selectedPay!=='';
  }
  document.getElementById('btnGuardar').disabled=!(Object.keys(cart).length>0 && listo);
  document.getElementById('btnPendiente').disabled = Object.keys(cart).length===0;
}

function selectPay(m){
  selectedPay=m;
  document.querySelectorAll('#payMethodsSimple .pay-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('pay-'+m).classList.add('selected');
  updateTotals();
}

function guardarPedido(){
  const tasa=parseFloat(document.getElementById('tasaUSD').value)||0;
  const dk=todayKey();const orders=getOrders(dk);const num=orders.length+1;
  let totalUSD=0;const items=[];
  Object.entries(cart).forEach(([idx,qty])=>{
    const p=MENU[parseInt(idx)];totalUSD+=p.price*qty;
    items.push({name:p.name,qty,price:p.price,subtotal:p.price*qty});
  });

  let pagos;
  if(modoSplit){
    pagos=calcularAsignadoSplit().pagos;
    if(!pagos.length){ alert('Asigna al menos un método de pago.'); return; }
  } else {
    pagos=[{metodo:selectedPay,montoUSD:totalUSD,montoBs:tasa>0?totalUSD*tasa:null}];
  }

  const horaAhora=new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  const nuevoPedido={
    id:uid(),num,fecha:dk,time:horaAhora,horaPago:horaAhora,
    items,totalUSD,totalBs:tasa>0?totalUSD*tasa:null,tasa,
    pay: pagos.length===1?pagos[0].metodo:'MIXTO',
    pagos, estado:'pagado', turno:turnoActual, referencia:'', _ts:Date.now()
  };
  addOrderToStore(nuevoPedido);
  sincronizarEnNube('pedido',nuevoPedido);

  limpiarFormularioPedido();
  showToast(`✅ Pedido #${num} guardado`);
}

function limpiarFormularioPedido(){
  cart={};selectedPay='';
  if(modoSplit) toggleSplitPay();

function dejarPendiente(){
  const tasa=parseFloat(document.getElementById('tasaUSD').value)||0;
  const dk=todayKey();const orders=getOrders(dk);const num=orders.length+1;
  let totalUSD=0;const items=[];
  Object.entries(cart).forEach(([idx,qty])=>{
    const p=MENU[parseInt(idx)];totalUSD+=p.price*qty;
    items.push({name:p.name,qty,price:p.price,subtotal:p.price*qty});
  });
  if(!items.length){ alert('Agrega productos primero.'); return; }
  const referencia=document.getElementById('pedidoReferencia').value.trim() || `Pedido #${num}`;

  const nuevoPedido={
    id:uid(),num,fecha:dk,
    time:new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}),
    horaPago:null,
    items,totalUSD,totalBs:tasa>0?totalUSD*tasa:null,tasa,
    pay:null,pagos:[],estado:'abierto',turno:turnoActual,referencia,_ts:Date.now()
  };
  addOrderToStore(nuevoPedido);
  sincronizarEnNube('pedido',nuevoPedido);

  limpiarFormularioPedido();
  showToast(`🕓 "${referencia}" quedó pendiente de pago`);
}

function completarPago(id,pagos){
  const todos=cargarJSON('guayoyo_pedidos');
  const o=todos.find(x=>x.id===id);
  if(!o) return;
  o.estado='pagado';
  o.pagos=pagos;
  o.pay=pagos.length===1?pagos[0].metodo:'MIXTO';
  o.horaPago=new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  o._ts=Date.now();
  guardarJSON('guayoyo_pedidos',todos);
  sincronizarEnNube('pedido',o);
  cobroAbiertoId=null;
  renderAbiertas();
  showToast(`✅ "${o.referencia}" cobrado`);
}

function confirmarCobroSimple(id,metodo){
  const todos=cargarJSON('guayoyo_pedidos');
  const o=todos.find(x=>x.id===id);
  if(!o) return;
  const tasa=o.tasa || (obtenerTasaFecha(todayKey())?.tasaUSD) || 0;
  completarPago(id,[{metodo,montoUSD:o.totalUSD,montoBs:tasa>0?o.totalUSD*tasa:null}]);
}

function confirmarCobroSplit(id){
  const todos=cargarJSON('guayoyo_pedidos');
  const o=todos.find(x=>x.id===id);
  if(!o) return;
  const tasa=o.tasa || (obtenerTasaFecha(todayKey())?.tasaUSD) || 0;
  let asignadoUSD=0; const pagos=[];
  ['EDIV','PM','POS','EBS'].forEach(m=>{
    const el=document.getElementById(`cobro-split-${m}-${id}`);
    const val=parseFloat(el?el.value:0)||0;
    if(val>0){
      if(MONEDA_METODO[m]==='USD'){ pagos.push({metodo:m,montoUSD:val,montoBs:tasa>0?val*tasa:null}); asignadoUSD+=val; }
      else { const usdEq=tasa>0?val/tasa:0; pagos.push({metodo:m,montoUSD:usdEq,montoBs:val}); asignadoUSD+=usdEq; }
    }
  });
  if(!pagos.length){ alert('Asigna al menos un método.'); return; }
  if(Math.abs(asignadoUSD-o.totalUSD)>0.05){
    if(!confirm(`Lo asignado ($${asignadoUSD.toFixed(2)}) no coincide exactamente con el total ($${o.totalUSD.toFixed(2)}). ¿Guardar de todas formas?`)) return;
  }
  completarPago(id,pagos);
}

function agregarFactura(){
  const desc=document.getElementById('facturaDesc').value.trim();

  const fechaPago=document.getElementById('facturaFecha').value;

  const factura={id:uid(),descripcion:desc,montoUSD:monto,fechaPago,estado:'pendiente',fechaPagada:null,montoBs:null,metodoPago:null,tasaUsada:null,_ts:Date.now()};

function marcarFacturaPagada(id){
  const facturas=cargarJSON('guayoyo_facturas');
  const f=facturas.find(x=>x.id===id);
  if(!f) return;

  const metodoStr=prompt('¿Con qué método se pagó? Escribe: PM, POS, EBS o EDIV','EBS');
  if(!metodoStr || !PAY_LABELS[metodoStr.toUpperCase()] || metodoStr.toUpperCase()==='MIXTO'){ alert('Método no válido.'); return; }
  const m=metodoStr.toUpperCase();

  const hoy=todayKey();
  let tasaInfo=obtenerTasaFecha(hoy);
  let tasaUSD;
  if(tasaInfo && tasaInfo.tasaUSD){ tasaUSD=tasaInfo.tasaUSD; }
  else {
    const manual=parseFloat(prompt('No tengo la tasa BCV de hoy guardada. Ingrésala:',''));
    if(isNaN(manual)||manual<=0){ alert('Tasa no válida, se canceló.'); return; }
    tasaUSD=manual;
    const historial=cargarJSON('guayoyo_tasas_historial');
    const idx=historial.findIndex(r=>r.fecha===hoy);
    const registro={fecha:hoy,tasaUSD,tasaEUR:(idx>=0?historial[idx].tasaEUR:0),_ts:Date.now()};
    if(idx>=0) historial[idx]=registro; else historial.push(registro);
    guardarJSON('guayoyo_tasas_historial',historial);
    sincronizarEnNube('tasa',registro);
  }

  f.estado='pagada'; f.fechaPagada=hoy; f.metodoPago=m; f.tasaUsada=tasaUSD; f.montoBs=f.montoUSD*tasaUSD; f._ts=Date.now();
  guardarJSON('guayoyo_facturas',facturas);
  sincronizarEnNube('factura',f);

  // Se refleja automáticamente como gasto del día, para que se descuente del resumen/caja.
  const gastos=cargarJSON('guayoyo_gastos');
  const yaExiste=gastos.some(g=>g.facturaId===f.id);
  if(!yaExiste){
    const gasto={id:uid(),fecha:hoy,descripcion:'Factura: '+f.descripcion,montoUSD:f.montoUSD,montoBs:f.montoBs,metodo:m,moneda:'USD',facturaId:f.id,_ts:Date.now()};
    gastos.push(gasto);
    guardarJSON('guayoyo_gastos',gastos);
    sincronizarEnNube('gasto',gasto);
  }

  renderFacturas();
  showToast('✅ Factura marcada como pagada y agregada a gastos');
}

function editarFactura(id){
  const facturas=cargarJSON('guayoyo_facturas');
  const f=facturas.find(x=>x.id===id);
  if(!f) return;

  const desc=prompt('Descripción:',f.descripcion);
  if(desc===null) return;
  if(!desc.trim()){ alert('La descripción no puede quedar vacía.'); return; }

  const montoStr=prompt('Monto en $:',f.montoUSD);
  if(montoStr===null) return;
  const monto=parseFloat(montoStr);
  if(isNaN(monto)||monto<=0){ alert('Ingresa un monto válido.'); return; }

  f.descripcion=desc.trim();
  f.montoUSD=monto;

  if(f.estado==='pendiente'){
    const fechaStr=prompt('Fecha de pago (AAAA-MM-DD):',f.fechaPago);
    if(fechaStr===null) return;
    if(!/^\d{4}-\d{2}-\d{2}$/.test(fechaStr.trim())){ alert('Formato de fecha no válido. Usa AAAA-MM-DD.'); return; }
    f.fechaPago=fechaStr.trim();
  } else if(f.estado==='pagada'){
    const fechaStr=prompt('Fecha en que se pagó (AAAA-MM-DD):',f.fechaPagada);
    if(fechaStr===null) return;
    if(!/^\d{4}-\d{2}-\d{2}$/.test(fechaStr.trim())){ alert('Formato de fecha no válido. Usa AAAA-MM-DD.'); return; }
    f.fechaPagada=fechaStr.trim();

    const metodoStr=prompt('Método de pago (PM, POS, EBS o EDIV):',f.metodoPago);
    if(metodoStr===null) return;
    const m=metodoStr.trim().toUpperCase();
    if(!PAY_LABELS[m] || m==='MIXTO'){ alert('Método no válido.'); return; }
    f.metodoPago=m;

    // La tasa usada no se toca (fue la tasa vigente el día que se pagó);
    // solo se recalcula el equivalente en Bs con el nuevo monto en $.
    if(f.tasaUsada) f.montoBs=f.montoUSD*f.tasaUsada;
  }

  f._ts=Date.now();
  guardarJSON('guayoyo_facturas',facturas);
  sincronizarEnNube('factura',f);

  // Si esta factura ya había generado un gasto automático, lo actualizamos también.
  if(f.estado==='pagada'){
    const gastos=cargarJSON('guayoyo_gastos');
    const gastoLigado=gastos.find(g=>g.facturaId===f.id);
    if(gastoLigado){
      gastoLigado.descripcion='Factura: '+f.descripcion;
      gastoLigado.montoUSD=f.montoUSD;
      gastoLigado.montoBs=f.montoBs;
      gastoLigado.metodo=f.metodoPago;
      gastoLigado.fecha=f.fechaPagada;
      gastoLigado._ts=Date.now();
      guardarJSON('guayoyo_gastos',gastos);
      sincronizarEnNube('gasto',gastoLigado);
    }
  }

  renderFacturas();
  renderGastos();
  showToast('✅ Factura actualizada');
}

function eliminarFactura(id){

  const restantes=facturas.filter(x=>x.id!==id);
  guardarJSON('guayoyo_facturas',restantes);
  eliminarEnNube('factura',id);

  if(gastoLigado){
    const gastosRestantes=gastos.filter(g=>g.id!==gastoLigado.id);
    guardarJSON('guayoyo_gastos',gastosRestantes);
    eliminarEnNube('gasto',gastoLigado.id);
  }
  renderFacturas();
  renderGastos();
}

function semanaActual(){ return semanaConOffset(0); }
function semanaConOffset(offset){
  const hoy=new Date();
  const dow=hoy.getDay();
  const diffLunes = dow===0 ? -6 : 1-dow;
  const lunes=new Date(hoy); lunes.setDate(hoy.getDate()+diffLunes+(offset*7));
  const domingo=new Date(lunes); domingo.setDate(lunes.getDate()+6);
  const f=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  return {desde:f(lunes),hasta:f(domingo)};
}

function calcularNetoSemana(empId,desde,hasta){
  const movs=cargarJSON('guayoyo_movimientos_empleado').filter(m=>m.empleadoId===empId && m.fecha>=desde && m.fecha<=hasta);
  const adelantosBs = movs.filter(m=>m.tipo==='adelanto').reduce((s,m)=>s+(m.montoBs||0),0);
  const consumosUSD = movs.filter(m=>m.tipo==='consumo').reduce((s,m)=>s+(m.montoUSD||0),0);
  const horasExtra = movs.filter(m=>m.tipo==='extra');
  const horasExtraBs = horasExtra.reduce((s,m)=>s+(m.montoBs||0),0);
  const totalHorasExtra = horasExtra.reduce((s,m)=>s+(m.horas||0),0);
  const empleados=cargarJSON('guayoyo_empleados');
  const emp=empleados.find(e=>e.id===empId);
  const salarioUSD = emp?emp.salarioSemanalUSD:0;
  const historialOrdenado=cargarJSON('guayoyo_tasas_historial').slice().sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const tasaInfo = obtenerTasaFecha(hasta) || historialOrdenado[0];
  const tasaEUR = tasaInfo ? tasaInfo.tasaEUR : 0;
  const tasaUSDRef = tasaInfo ? tasaInfo.tasaUSD : 0;
  const salarioBs = tasaEUR ? salarioUSD*tasaEUR : 0;
  const consumosBs = tasaUSDRef ? consumosUSD*tasaUSDRef : 0;
  const netoBs = salarioBs + horasExtraBs - adelantosBs - consumosBs;
  return {salarioBs,adelantosBs,consumosUSD,consumosBs,horasExtraBs,totalHorasExtra,netoBs,tasaEUR};
}

function generarReciboPDF(empId){
  const empleados=cargarJSON('guayoyo_empleados');
  const emp=empleados.find(e=>e.id===empId);
  if(!emp) return;
  if(!window.jspdf){ alert('No se pudo cargar el generador de PDF. Revisa tu conexión a internet e intenta de nuevo.'); return; }

  const semana=semanaConOffset(semanaOffsetEmpleados);
  const r=calcularNetoSemana(empId,semana.desde,semana.hasta);
  const movs=cargarJSON('guayoyo_movimientos_empleado')
    .filter(m=>m.empleadoId===empId && m.fecha>=semana.desde && m.fecha<=semana.hasta)
    .sort((a,b)=>a.fecha.localeCompare(b.fecha));

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'mm',format:'a4'});
  const azul='#1B2ED4', rojo='#E8341A', muted='#666660';

  // Encabezado con logo
  const logoImg=document.querySelector('.logo-img');
  doc.setFillColor(azul);
  doc.rect(0,0,210,26,'F');
  if(logoImg && logoImg.src){
    try{ doc.addImage(logoImg.src,'PNG',12,5,16,16); }catch(e){ console.warn('No se pudo insertar el logo en el PDF',e); }
  }
  doc.setTextColor('#FFFFFF');
  doc.setFontSize(18);
  doc.text('GUAYOYO',32,13);
  doc.setFontSize(11);
  doc.text('Recibo de pago',32,20);

  doc.setTextColor('#000000');
  doc.setFontSize(10);
  doc.text(`Emitido: ${todayKey()}`,150,13);

  // Datos del empleado
  let y=36;
  doc.setFontSize(12);
  doc.setFont(undefined,'bold');
  doc.text(emp.nombre,14,y);
  doc.setFont(undefined,'normal');
  doc.setFontSize(10);
  doc.setTextColor(muted);
  y+=6;
  doc.text(`Turno: ${emp.turno||'—'}   ·   Día libre: ${emp.diaLibre||'—'}`,14,y);
  y+=5;
  doc.text(`Semana correspondiente: ${semana.desde} al ${semana.hasta}`,14,y);
  doc.setTextColor('#000000');

  // Tabla de detalle del pago
  y+=6;
  const filas=[
    ['Salario base (tasa EUR BCV' + (r.tasaEUR?` ${r.tasaEUR}`:'')+')', r.tasaEUR?fmtBs(r.salarioBs):'falta tasa EUR'],
    [`+ Horas extra${r.totalHorasExtra?` (${r.totalHorasExtra}h)`:''}`, fmtBs(r.horasExtraBs)],
    ['− Adelantos', '−'+fmtBs(r.adelantosBs)],
    ['− Consumos (a precio de carta)', '−'+fmt$(r.consumosUSD)],
  ];
  doc.autoTable({
    startY:y,
    head:[['Concepto','Monto']],
    body:filas,
    theme:'plain',
    styles:{fontSize:10,cellPadding:2},
    headStyles:{fillColor:azul,textColor:'#FFFFFF'},
    columnStyles:{1:{halign:'right'}},
  });

  let y2=doc.lastAutoTable.finalY+4;
  doc.setFillColor('#F2F0EC');
  doc.rect(14,y2,182,10,'F');
  doc.setFont(undefined,'bold');
  doc.setFontSize(12);
  doc.text('NETO A PAGAR',18,y2+7);
  doc.setTextColor(rojo);
  doc.text(r.tasaEUR?fmtBs(r.netoBs):'—',192,y2+7,{align:'right'});
  doc.setTextColor('#000000');
  doc.setFont(undefined,'normal');

  // Detalle de movimientos de la semana
  y2+=18;
  if(movs.length){
    doc.setFontSize(11);
    doc.setFont(undefined,'bold');
    doc.text('Detalle de movimientos de la semana',14,y2);
    doc.setFont(undefined,'normal');
    const filasMov=movs.map(m=>{
      const etiqueta = m.tipo==='adelanto' ? 'Adelanto' : m.tipo==='extra' ? `Hora extra (${m.horas||0}h)` : 'Consumo'+(m.descripcion?': '+m.descripcion:'');
      const valor = m.tipo==='consumo' ? fmt$(m.montoUSD) : fmtBs(m.montoBs);
      return [m.fecha,etiqueta,valor];
    });
    doc.autoTable({
      startY:y2+4,
      head:[['Fecha','Concepto','Monto']],
      body:filasMov,
      theme:'striped',
      styles:{fontSize:9,cellPadding:2},
      headStyles:{fillColor:'#D8D5CC',textColor:'#000000'},
      columnStyles:{2:{halign:'right'}},
    });
    y2=doc.lastAutoTable.finalY+14;
  } else {
    y2+=6;
  }

  // Firmas
  const yFirma=Math.max(y2+20,250);
  doc.setDrawColor('#999999');
  doc.line(20,yFirma,90,yFirma);
  doc.line(120,yFirma,190,yFirma);
  doc.setFontSize(9);
  doc.setTextColor(muted);
  doc.text('Firma del empleado',30,yFirma+5);
  doc.text('Firma Guayoyo',140,yFirma+5);

  const nombreArchivo=`Recibo_${emp.nombre.replace(/[^a-zA-Z0-9]+/g,'_')}_${semana.desde}.pdf`;
  doc.save(nombreArchivo);
}

  return getOrders(dk).filter(o=>o.estado==='pagado' && (!desde || (o.horaPago||o.time) > desde));
}
function cerrarTurno(){
  const dk=document.getElementById('resumenDate').value;
  const pendientes=pedidosPendientesDeCierre(dk);
  if(!pendientes.length){ alert('No hay ventas pagadas pendientes de cierre en este rango.'); return; }
  const porMetodo={PM:0,POS:0,EBS:0,EDIV:0};
  let totalUSD=0,totalBs=0;
  pendientes.forEach(o=>{
    totalUSD+=o.totalUSD; totalBs+=o.totalBs||0;
    pagosDe(o).forEach(p=>{ if(porMetodo[p.metodo]!==undefined) porMetodo[p.metodo]+=(p.montoUSD||0); });
  });
  if(!confirm(`Cerrar turno ${turnoActual==='manana'?'Mañana':'Tarde'} con ${pendientes.length} pedido(s) por $${totalUSD.toFixed(2)}. ¿Confirmar?`)) return;

  const cierre={
    id:uid(),fecha:dk,turno:turnoActual,
    horaCierre:new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}),
    numPedidos:pendientes.length,totalUSD,totalBs,porMetodo,_ts:Date.now()
  };
  const cierres=cargarJSON('guayoyo_cierres');
  cierres.push(cierre);
  guardarJSON('guayoyo_cierres',cierres);
  sincronizarEnNube('cierre',cierre);
  renderResumen();
  showToast('🔒 Turno cerrado');
}

function setSemanaActualGanancias(){
  const semana=semanaActual();
  document.getElementById('gananciaDesde').value=semana.desde;
  document.getElementById('gananciaHasta').value=semana.hasta;
  renderGanancias();
}

function calcularGananciasRango(desde,hasta){
  const pedidos=cargarJSON('guayoyo_pedidos').filter(o=>o.estado==='pagado' && o.fecha>=desde && o.fecha<=hasta);
  const ventasPedidosUSD=pedidos.reduce((s,o)=>s+o.totalUSD,0);

  // Los consumos del equipo se cobran a precio de carta (se descuentan de su
  // sueldo), así que SÍ son venta real para el negocio, no un regalo.
  const consumosUSD=cargarJSON('guayoyo_movimientos_empleado').filter(m=>m.tipo==='consumo' && m.fecha>=desde && m.fecha<=hasta).reduce((s,m)=>s+(m.montoUSD||0),0);

  const ventasTotalesUSD=ventasPedidosUSD+consumosUSD;

  const gastosUSD=cargarJSON('guayoyo_gastos').filter(g=>g.fecha>=desde && g.fecha<=hasta && !g.facturaId).reduce((s,g)=>s+(g.montoUSD||0),0);

  const facturasUSD=cargarJSON('guayoyo_facturas').filter(f=>f.estado==='pagada' && f.fechaPagada>=desde && f.fechaPagada<=hasta).reduce((s,f)=>s+(f.montoUSD||0),0);

  const empleados=cargarJSON('guayoyo_empleados');
  const salarioBaseUSD=empleados.reduce((s,e)=>s+(e.salarioSemanalUSD||0),0);
  const horasExtraUSD=cargarJSON('guayoyo_movimientos_empleado').filter(m=>m.tipo==='extra' && m.fecha>=desde && m.fecha<=hasta).reduce((s,m)=>s+(m.montoUSD||0),0);
  const nominaUSD=salarioBaseUSD+horasExtraUSD;

  const gananciaNeta=ventasTotalesUSD-gastosUSD-facturasUSD-nominaUSD;
  return {numPedidos:pedidos.length,ventasPedidosUSD,consumosUSD,ventasTotalesUSD,gastosUSD,facturasUSD,salarioBaseUSD,horasExtraUSD,nominaUSD,gananciaNeta};
}

function renderGanancias(){
  const desde=document.getElementById('gananciaDesde').value;
  const hasta=document.getElementById('gananciaHasta').value;
  if(!desde||!hasta) return;
  const r=calcularGananciasRango(desde,hasta);
  const tasaInfo=obtenerTasaFecha(hasta);
  const tasa=tasaInfo?tasaInfo.tasaUSD:0;
  const sub=v=>tasa?`<div style="font-size:10px;color:var(--muted);font-weight:500;">${fmtBs(v*tasa)}</div>`:'';
  const el=document.getElementById('gananciasContent');
  el.innerHTML=`
    <div class="summary-row"><span>Ventas (${r.numPedidos} pedidos)</span><span class="val" style="text-align:right;color:var(--azul)">+${fmt$(r.ventasPedidosUSD)}${sub(r.ventasPedidosUSD)}</span></div>
    <div class="summary-row"><span>Consumos del equipo (venta a precio de carta)</span><span class="val" style="text-align:right;color:var(--azul)">+${fmt$(r.consumosUSD)}${sub(r.consumosUSD)}</span></div>
    <div class="summary-row"><span>− Gastos</span><span class="val" style="text-align:right;">−${fmt$(r.gastosUSD)}${sub(r.gastosUSD)}</span></div>
    <div class="summary-row"><span>− Facturas pagadas</span><span class="val" style="text-align:right;">−${fmt$(r.facturasUSD)}${sub(r.facturasUSD)}</span></div>
    <div class="summary-row"><span>− Nómina (salarios + horas extra)</span><span class="val" style="text-align:right;">−${fmt$(r.nominaUSD)}${sub(r.nominaUSD)}</span></div>
    <div class="summary-total-row">
      <span>Ganancia neta</span>
      <span style="text-align:right;">
        <div style="color:${r.gananciaNeta>=0?'#166534':'#c0392b'}">${fmt$(r.gananciaNeta)}</div>

      </span>

  `;
}

function calcularBalancePorMetodo(dk){
  const apertura=obtenerAperturaFecha(dk);
  const tasaInfo=obtenerTasaFecha(dk);
  const tasa=tasaInfo?tasaInfo.tasaUSD:0;
  const aperturaUSDenBs = apertura.aperturaUSD||0;
  const balance={PM:0,POS:0,EBS:apertura.aperturaBs && tasa ? apertura.aperturaBs/tasa : 0,EDIV:aperturaUSDenBs};
  const balanceBs={PM:0,POS:0,EBS:apertura.aperturaBs||0,EDIV:tasa?aperturaUSDenBs*tasa:0};
  getOrders(dk).filter(o=>o.estado==='pagado').forEach(o=>{
    pagosDe(o).forEach(p=>{
      if(balance[p.metodo]!==undefined){
        balance[p.metodo]+=(p.montoUSD||0);
        balanceBs[p.metodo]+=(p.montoBs!=null?p.montoBs:(tasa?(p.montoUSD||0)*tasa:0));
      }
    });
  });
  cargarJSON('guayoyo_gastos').filter(g=>g.fecha===dk && !g.facturaId).forEach(g=>{
    if(balance[g.metodo]!==undefined){
      balance[g.metodo]-=(g.montoUSD||0);
      balanceBs[g.metodo]-=(g.montoBs!=null?g.montoBs:(tasa?(g.montoUSD||0)*tasa:0));
    }
  });
  cargarJSON('guayoyo_facturas').filter(f=>f.estado==='pagada' && f.fechaPagada===dk).forEach(f=>{
    if(balance[f.metodoPago]!==undefined){
      balance[f.metodoPago]-=(f.montoUSD||0);
      balanceBs[f.metodoPago]-=(f.montoBs!=null?f.montoBs:(tasa?(f.montoUSD||0)*tasa:0));
    }
  });
  cargarJSON('guayoyo_movimientos_empleado').filter(m=>m.tipo==='adelanto' && m.fecha===dk).forEach(m=>{
    if(balance[m.metodo]!==undefined){
      balance[m.metodo]-=(m.montoUSD||0);
      balanceBs[m.metodo]-=(m.montoBs!=null?m.montoBs:(tasa?(m.montoUSD||0)*tasa:0));
    }
  });
  return {usd:balance,bs:balanceBs};
}

  const dateLabel=new Date(dk+'T12:00:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  el.innerHTML=`

          <span><span class="order-pay-tag ${PAY_CLASS[pay]}" style="margin-right:6px;">${PAY_LABELS[pay]}</span>

          <span class="val" style="text-align:right;">$${d.usd.toFixed(2)}${d.bs?`<div style="font-size:10px;color:var(--muted);font-weight:500;">Bs ${d.bs.toFixed(2)}</div>`:''}</span>
        </div>`).join('')}

      ${Object.keys(PAY_LABELS).filter(m=>m!=='MIXTO').map(m=>`
        <div class="balance-row">
          <span>${PAY_LABELS[m]}</span>
          <span style="text-align:right;">
            <div class="${balance.usd[m]>=0?'balance-pos':'balance-neg'}">${fmt$(balance.usd[m])}</div>
            <div style="font-size:10px;color:var(--muted);font-weight:500;">${fmtBs(balance.bs[m])}</div>
          </span>
        </div>`).join('')}
    </div>

}

// ======================================================================
// SINCRONIZACIÓN CON GOOGLE SHEETS
// ======================================================================
async function sincronizarDesdeNube(){
  if(!APPS_SCRIPT_URL_GUAYOYO) return false;
  try{
    const resp=await fetch(APPS_SCRIPT_URL_GUAYOYO);
    if(!resp.ok) throw new Error('respuesta no OK: '+resp.status);
    const data=await resp.json();
    console.log('%c[DIAGNOSTICO] datos recibidos de la nube','color:blue',data);
    fusionarBorrados(data.borrados);
    fusionar('guayoyo_tasas_historial',data.tasas,'fecha','tasa');
    fusionar('guayoyo_pedidos',data.pedidos,'id','pedido');
    fusionar('guayoyo_gastos',data.gastos,'id','gasto');
    fusionar('guayoyo_facturas',data.facturas,'id','factura');
    if(Array.isArray(data.empleados) && data.empleados.length) fusionar('guayoyo_empleados',data.empleados,'id','empleado');
    fusionar('guayoyo_movimientos_empleado',data.movimientos,'id','movimiento');
    fusionar('guayoyo_cierres',data.cierres,'id','cierre');
    fusionar('guayoyo_caja_apertura',data.aperturas,'fecha','apertura');
    return true;
  }catch(e){ console.warn('%c[DIAGNOSTICO] fallo al sincronizar desde la nube','color:red',e); return false; }
}

// Combina los "borrados" que reporta la nube (hechos desde CUALQUIER
// dispositivo, incluyendo el de tu familiar) con los que ya conoce este
// dispositivo, quedándose con la fecha más reciente de cada uno. Así, si
// alguien borra algo desde su teléfono, el otro también deja de mostrarlo
// y no lo vuelve a subir por accidente con una copia vieja.
function fusionarBorrados(remotos){
  if(!Array.isArray(remotos) || !remotos.length) return;
  const locales=cargarJSON('guayoyo_borrados');
  const mapa={};
  locales.forEach(b=>{ mapa[b.tipo+'|'+b.id]=b; });
  remotos.forEach(b=>{
    const key=b.tipo+'|'+b.id;
    if(!mapa[key] || (b.ts||0) > (mapa[key].ts||0)) mapa[key]={tipo:b.tipo,id:String(b.id),ts:b.ts||0};
  });
  guardarJSON('guayoyo_borrados',Object.values(mapa));
}

// Combina lo que llega de la nube con lo que ya está en este dispositivo,
// comparando cuál versión es más reciente (campo _ts). Si un registro
// local es más nuevo que el de la nube (por ejemplo, la nube todavía no
// terminó de procesar el guardado anterior), se conserva el local y se
// reintenta subir — nunca se pierde el cambio más reciente. Además respeta
// los borrados (arriba) para no resucitar algo que ya se eliminó.
function fusionar(lsKey,remotos,clave,tipo){
  if(!Array.isArray(remotos)) return;
  const locales=cargarJSON(lsKey);
  const idsBorrados={};
  cargarJSON('guayoyo_borrados').filter(b=>b.tipo===tipo).forEach(b=>{ idsBorrados[b.id]=b.ts; });

  const mapa={};
  remotos.forEach(r=>{
    const key=String(r[clave]);
    // Si este registro fue borrado en este dispositivo y la nube no trae una
    // versión más nueva que ese borrado, lo ignoramos: no debe resucitar.
    if(idsBorrados[key]!==undefined && (r._ts||0)<=idsBorrados[key]) return;
    mapa[key]=r;
  });
  const aRepush=[];
  locales.forEach(l=>{
    const key=String(l[clave]);
    if(idsBorrados[key]!==undefined && (l._ts||0)<=idsBorrados[key]) return; // no revivirlo localmente tampoco
    const remoto=mapa[key];
    if(!remoto || (l._ts||0) > (remoto._ts||0)){ mapa[key]=l; aRepush.push(l); }
  });
  const resultado=Object.values(mapa);
  console.log(`%c[DIAGNOSTICO] ${lsKey}`,'color:green',{remotos:remotos.length,locales:locales.length,resultadoFinal:resultado.length,aResubir:aRepush.length,borrados:Object.keys(idsBorrados).length});
  guardarJSON(lsKey,resultado);
  aRepush.forEach((item,i)=>setTimeout(()=>sincronizarEnNube(tipo,item), i*250));
}
async function sincronizarEnNube(tipo,registro){
  if(!APPS_SCRIPT_URL_GUAYOYO) return;
  try{
    const resp=await fetch(APPS_SCRIPT_URL_GUAYOYO,{method:'POST',body:JSON.stringify({accion:'guardar',tipo,registro})});
    const data=await resp.json();
    console.log(`%c[DIAGNOSTICO] subida ${tipo}`,'color:purple',{registro,respuesta:data});
    mostrarEstadoSync(data.ok?'ok':'error');
  }catch(e){ console.warn(`%c[DIAGNOSTICO] fallo al subir ${tipo}`,'color:red',e); mostrarEstadoSync('error'); }
}
async function eliminarEnNube(tipo,id){
  registrarBorrado(tipo,id);
  if(!APPS_SCRIPT_URL_GUAYOYO) return;
  try{
    const resp=await fetch(APPS_SCRIPT_URL_GUAYOYO,{method:'POST',body:JSON.stringify({accion:'eliminar',tipo,id})});
    const data=await resp.json();
    mostrarEstadoSync(data.ok?'ok':'error');
  }catch(e){ console.warn('No se pudo eliminar en la nube',tipo,e); mostrarEstadoSync('error'); }
}
function mostrarEstadoSync(estado){
  const el=document.getElementById('syncBadge');
  if(!el) return;
  const estilos={
    local:{texto:'📴 Solo en este dispositivo',color:'rgba(255,255,255,0.55)'},
    checking:{texto:'🔄 Sincronizando…',color:'rgba(255,255,255,0.55)'},
    ok:{texto:'☁️ Sincronizado',color:'#7CFFB2'},
    error:{texto:'⚠️ Sin conexión — guardado local',color:'#FFD27C'},
  };
  const s=estilos[estado]||estilos.local;
  el.textContent=s.texto; el.style.color=s.color;
}

async function borrarTodoYReiniciar(){
  if(!confirm('¿Borrar TODOS los pedidos, tasas, gastos, facturas, cierres y caja — en este dispositivo Y en la nube? Esto no se puede deshacer.')) return;
  if(!confirm('Última confirmación: se perderá todo el historial actual para siempre. ¿Continuar?')) return;

  ['guayoyo_pedidos','guayoyo_tasas_historial','guayoyo_gastos','guayoyo_facturas','guayoyo_movimientos_empleado','guayoyo_cierres','guayoyo_caja_apertura']
    .forEach(k=>localStorage.removeItem(k));

  if(APPS_SCRIPT_URL_GUAYOYO){
    try{
      await fetch(APPS_SCRIPT_URL_GUAYOYO,{method:'POST',body:JSON.stringify({accion:'borrarTodo'})});
    }catch(e){ console.warn('No se pudo borrar en la nube',e); }
  }
  alert('Listo, todo quedó en cero. La app se va a recargar.');
  location.reload();
}
function renderTab(id){
  if(id==='pedidos')renderPedidos();
  if(id==='abiertas')renderAbiertas();
  if(id==='resumen')renderResumen();
  if(id==='gastos')renderGastos();
  if(id==='facturas')renderFacturas();
  if(id==='empleados')renderEmpleados();
}

async function showPage(id,tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');tab.classList.add('active');

  if(intervalSync){ clearInterval(intervalSync); intervalSync=null; }

  if(id!=='nuevo' && APPS_SCRIPT_URL_GUAYOYO){
    mostrarEstadoSync('checking');
    const ok=await sincronizarDesdeNube();
    mostrarEstadoSync(ok?'ok':'error');
    renderTab(id);
    intervalSync=setInterval(async ()=>{
      const ok2=await sincronizarDesdeNube();
      mostrarEstadoSync(ok2?'ok':'error');
      renderTab(id);
    },30000);
  } else {
    renderTab(id);
  }
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
